name: run-one

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/**'
      - 'scripts/run_one.py'
      - '.github/workflows/run-one.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: run e2e
        run: python scripts/run_one.py

      - name: upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gen-outputs
          path: out/
          if-no-files-found: warn
          retention-days: 7
